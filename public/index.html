<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اطلب لي</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="bot-info">
                <div class="bot-avatar">
                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                </div>
                <div>
                    <h1>اطلب لي</h1>
                    <span class="status">● متصل</span>
                </div>
            </div>
            <div class="user-selector">
                <select id="user-select" dir="rtl">
                    <option value="mock_user_1">مستخدم 1 (أكل صحي)</option>
                    <option value="mock_user_2">مستخدم 2 (بيتزا وفاست فود)</option>
                    <option value="mock_user_3">مستخدم 3 (كبسة وشعبي)</option>
                    <option value="mock_user_4">مستخدم 4 (نباتي)</option>
                    <option value="mock_user_5">مستخدم 5 (عاشق الشاورما والبروستد)</option>
                </select>
            </div>
        </header>

        <!-- Messages Area -->
        <div class="chat-messages" id="chat-messages" dir="rtl">
            <div class="message ai">
                <div class="bubble">
                    <p>أهلاً! أنا مساعدك الذكي من "اطلب لي"، وش مشتهي تاكل اليوم؟</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <form id="chat-form" dir="rtl">
                <input type="text" id="chat-input" placeholder="اكتب طلبك هنا (مثلاً: مشتهي بروستد أو بيتزا تحت 50 ريال)..." autocomplete="off">
                <button type="submit" id="send-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>
    
    <script src="/app.js"></script>
</body>
</html>
